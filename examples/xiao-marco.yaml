esphome:
  name: xiao-marco

nrf52:
  board: xiao_ble
  bootloader: adafruit
  dfu:
    reset_pin: 18

logger:
  level: DEBUG

external_components:
  - source:
      type: git
      url: https://github.com/netmilk/esphome-meshcore
      ref: main
    components: [meshcore_sensor]

meshcore_sensor:
  id: meshcore
  name: "Marco Polo"

  on_command:
    - command: "marco"
      lambda: |-
        return std::string("polo");

    - command: "time"
      lambda: |-
        uint32_t t = id(meshcore).get_time();
        time_t ts = (time_t)t;
        struct tm *tm = gmtime(&ts);
        char buf[32];
        strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M:%S", tm);
        return std::string(buf);

    - command: "d6 on"
      lambda: |-
        id(d6).turn_on();
        return std::string("D6 ON");

    - command: "d6 off"
      lambda: |-
        id(d6).turn_off();
        return std::string("D6 OFF");

    - command: "d7"
      lambda: |-
        return id(d7).state ? std::string("D7: HIGH") : std::string("D7: LOW");

switch:
  - platform: gpio
    pin: 43
    name: "D6 Output"
    id: d6

binary_sensor:
  - platform: gpio
    pin:
      number: 44
      mode: INPUT_PULLDOWN
    name: "D7 Input"
    id: d7
