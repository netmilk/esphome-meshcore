esphome:
  name: xiao-meshcore

nrf52:
  board: xiao_ble
  bootloader: adafruit
  dfu:
    reset_pin: 18

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: components

meshcore_sensor:
  id: meshcore
  name: "LED Sensor"
  password: "password"
  led_pin: 26
  meshcore_path: "MeshCore"
  # LoRa SX1262 pins (nRF52840 GPIO numbers matching MeshCore XIAO variant)
  lora_cs_pin: 4         # P0.04 = D4
  lora_reset_pin: 28     # P0.28 = D2
  lora_busy_pin: 29      # P0.29 = D3
  lora_dio1_pin: 3       # P0.03 = D1
  lora_rxen_pin: 5       # P0.05 = D5
  lora_sclk_pin: 45      # P1.13 = D8/SCK
  lora_miso_pin: 46      # P1.14 = D9/MISO
  lora_mosi_pin: 47      # P1.15 = D10/MOSI
  # Czech/narrow radio preset
  frequency: 869.432
  bandwidth: 62.5
  spreading_factor: 7
  coding_rate: 5
  tx_power: 22

  on_command:
    - command: "led on"
      lambda: |-
        id(meshcore).set_led(true);
        return std::string("LED is ON");

    - command: "led off"
      lambda: |-
        id(meshcore).set_led(false);
        return std::string("LED is OFF");

    - command: "led toggle"
      lambda: |-
        bool new_state = !id(meshcore).get_led();
        id(meshcore).set_led(new_state);
        return new_state ? std::string("LED toggled ON") : std::string("LED toggled OFF");

    - command: "led status"
      lambda: |-
        return id(meshcore).get_led() ? std::string("LED: ON") : std::string("LED: OFF");

    - command: "uptime"
      lambda: |-
        uint32_t ms = millis();
        uint32_t secs = ms / 1000;
        uint32_t mins = secs / 60;
        uint32_t hrs = mins / 60;
        uint32_t days = hrs / 24;
        char buf[64];
        snprintf(buf, sizeof(buf), "%ud %uh %um %us",
                 days, hrs % 24, mins % 60, secs % 60);
        return std::string(buf);
